<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entwickler Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen">

    <header class="bg-slate-800 shadow-lg">
        <div class="max-w-6xl mx-auto px-6 py-4">
            <h1 class="text-3xl font-bold">
                Entwickler Dashboard
            </h1>
            <p class="text-slate-400 mt-1">
                Deine Projekte sauber im Blick
            </p>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-6">

        <section class="bg-slate-800 rounded-xl p-6 shadow-lg mb-6">
            <h2 class="text-2xl font-semibold mb-4">
                Willkommen
            </h2>

            <p id="welcomeText" class="text-slate-300">
                Dashboard wird geladen...
            </p>
        </section>

        <section class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-slate-800 rounded-xl p-5 border border-slate-700">
                <p class="text-slate-400">Gesamt</p>
                <p id="totalProjects" class="text-3xl font-bold mt-2">0</p>
            </div>

            <div class="bg-slate-800 rounded-xl p-5 border border-slate-700">
                <p class="text-slate-400">Geplant</p>
                <p id="plannedProjects" class="text-3xl font-bold mt-2 text-blue-400">0</p>
            </div>

            <div class="bg-slate-800 rounded-xl p-5 border border-slate-700">
                <p class="text-slate-400">In Arbeit</p>
                <p id="workingProjects" class="text-3xl font-bold mt-2 text-yellow-400">0</p>
            </div>

            <div class="bg-slate-800 rounded-xl p-5 border border-slate-700">
                <p class="text-slate-400">Fertig</p>
                <p id="finishedProjects" class="text-3xl font-bold mt-2 text-green-400">0</p>
            </div>
        </section>

        <section class="bg-slate-800 rounded-xl p-6 shadow-lg mb-6">
            <h2 class="text-2xl font-semibold mb-4">
                Neues Projekt hinzufügen
            </h2>

            <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
                <input
                    id="projectNameInput"
                    type="text"
                    placeholder="Projektname"
                    class="bg-slate-900 border border-slate-700 rounded-lg px-4 py-3"
                >

                <select
                    id="projectLanguageSelect"
                    class="bg-slate-900 border border-slate-700 rounded-lg px-4 py-3"
                >
                    <option>HTML</option>
                    <option>CSS</option>
                    <option>JavaScript</option>
                    <option>TypeScript</option>
                    <option>Python</option>
                    <option>Lua</option>
                    <option>Ruby</option>
                    <option>Go</option>
                    <option>Nim</option>
                </select>

                <select
                    id="projectStatusSelect"
                    class="bg-slate-900 border border-slate-700 rounded-lg px-4 py-3"
                >
                    <option>Geplant</option>
                    <option>In Arbeit</option>
                    <option>Fertig</option>
                </select>

                <input
                    id="projectProgressInput"
                    type="number"
                    min="0"
                    max="100"
                    value="0"
                    class="bg-slate-900 border border-slate-700 rounded-lg px-4 py-3"
                >

                <button
                    id="addProjectButton"
                    class="bg-blue-600 hover:bg-blue-500 rounded-lg px-4 py-3 font-semibold"
                >
                    Projekt hinzufügen
                </button>
            </div>
        </section>

        <section class="bg-slate-800 rounded-xl p-6 shadow-lg mb-6">
            <h2 class="text-2xl font-semibold mb-4">
                Projektfilter
            </h2>

            <div class="flex flex-wrap gap-3">
                <button class="filter-button bg-slate-700 px-4 py-2 rounded-lg" data-filter="Alle">Alle</button>
                <button class="filter-button bg-blue-600 px-4 py-2 rounded-lg" data-filter="Geplant">Geplant</button>
                <button class="filter-button bg-yellow-600 px-4 py-2 rounded-lg" data-filter="In Arbeit">In Arbeit</button>
                <button class="filter-button bg-green-600 px-4 py-2 rounded-lg" data-filter="Fertig">Fertig</button>
            </div>
        </section>

        <section>
            <h2 class="text-2xl font-semibold mb-4">
                Meine Projekte
            </h2>

            <div id="projectList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
        </section>

    </main>

<footer class="max-w-6xl mx-auto px-6 py-6 mt-10 border-t border-slate-700 text-center text-slate-400">
    <p>Entwickler Dashboard · Version 11 · Projektverwaltung mit Tailwind CSS</p>
</footer>

    <script src="app.js"></script>

</body>
</html>
